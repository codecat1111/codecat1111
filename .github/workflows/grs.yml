name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write # This fixes the '128 Error' by allowing the bot to save files

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Silences the Node.js deprecation warning
    steps:
      - uses: actions/checkout@v4

      # STEP 1: Create the Stats Card
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight&count_private=true&include_all_commits=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # STEP 2: Create the Languages Card (THIS WAS MISSING)
      - name: Generate languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: languages
          options: username=${{ github.repository_owner }}&theme=tokyonight&layout=compact
          path: profile/langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # STEP 3: Save both files to your repo
      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || echo "No changes to commit"
          git push
